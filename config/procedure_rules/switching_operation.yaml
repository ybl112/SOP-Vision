# 电力倒闸操作规程 — 状态机定义
# 依据《电力安全工作规程（发电厂和变电站电气部分）》GB 26860

procedure_name: "倒闸操作"
total_steps: 5

steps:
  - index: 0
    name: "接令核对"
    class_id: 1
    description: "接受调度指令，核对操作票内容及设备编号"

  - index: 1
    name: "验电"
    class_id: 2
    description: "使用验电器确认设备无电压"

  - index: 2
    name: "拉闸断电"
    class_id: 3
    description: "按操作票顺序依次断开断路器及隔离开关"

  - index: 3
    name: "挂接地线"
    class_id: 4
    description: "在检修设备各可能来电侧装设接地线"

  - index: 4
    name: "悬挂标示牌"
    class_id: 5
    description: "在操作手柄及围栏处悬挂'有人工作，禁止合闸'标示牌"

# 合法状态转移 (稀疏矩阵，未列出的转移为非法)
valid_transitions:
  - [0, 0]   # 接令核对 → 接令核对 (持续)
  - [0, 1]   # 接令核对 → 验电
  - [1, 1]   # 验电 → 验电 (持续)
  - [1, 2]   # 验电 → 拉闸断电
  - [2, 2]   # 拉闸断电 → 拉闸断电 (持续)
  - [2, 3]   # 拉闸断电 → 挂接地线
  - [3, 3]   # 挂接地线 → 挂接地线 (持续)
  - [3, 4]   # 挂接地线 → 悬挂标示牌
  - [4, 4]   # 悬挂标示牌 → 悬挂标示牌 (持续/结束)

start_state: 0
end_state: 4
